{% extends 'pdf_manager/master_base.html' %}

{% block title %}Login Admin | Gerenciador de PDF{% endblock %}

{% block content %}
<section class="admin-login-layout">
  <div class="admin-login-card">
    <form method="post" class="panel auth-panel" autocomplete="on">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="button primary" type="submit">Entrar no Painel</button>
    </form>
    <p class="admin-login-note">Acesse com uma conta autorizada para acompanhar usuários, documentos e operações do sistema.</p>
  </div>
</section>
{% endblock %}
