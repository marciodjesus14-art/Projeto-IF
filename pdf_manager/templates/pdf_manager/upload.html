{% extends 'pdf_manager/base.html' %}

{% block title %}Enviar PDF | Gerenciador de PDF{% endblock %}

{% block content %}
<section class="form-page">
  <h1>Enviar PDF</h1>
  <p class="form-note">Tamanho maximo permitido: {{ max_upload_mb }} MB por PDF.</p>
  <form method="post" enctype="multipart/form-data" class="panel">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button primary" type="submit">Salvar documento</button>
  </form>
</section>
{% endblock %}
