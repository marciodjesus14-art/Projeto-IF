{% extends 'pdf_manager/base.html' %}

{% block title %}PDF para JPG | Gerenciador de PDF{% endblock %}

{% block content %}
<section class="form-page">
  <h1>PDF para JPG</h1>
  <p class="form-note">Cada página do PDF será convertida em JPG e baixada em um arquivo ZIP. Tamanho máximo: {{ max_upload_mb }} MB.</p>
  <form method="post" enctype="multipart/form-data" class="panel">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="button primary" type="submit">Converter para JPG</button>
  </form>
</section>
{% endblock %}
